    <!-- СТИЛИ -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            background-color: #F8F9FA;
            height: 100%;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F8F9FA;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        .main-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            padding: 2rem;
            border-radius: 38px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        h2 {
            color: #da4216;
            margin: 0 0 1.5rem 0;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .input-group {
            margin-bottom: 1.2rem;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 22px;
            font-size: 1rem;
            transition: border-color .3s ease;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            letter-spacing: 2px;
        }
        
        input:focus {
            outline: none;
            border-color: #6d9eeb;
            box-shadow: 0 0 0 3px rgba(52,152,219,.1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #6d9eeb;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .3s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin-top: .5rem;
        }
        
        button:hover {
            background: #3c78d8;
        }
        
        .text-primary {
            color: #6d9eeb;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 15px;
                align-items: flex-start;
                padding-top: max(20px, env(safe-area-inset-top));
            }
            
            .auth-container {
                padding: 1.5rem;
                margin: 0;
                max-width: 100%;
                width: 100%;
            }
        }

        /* ===== ПОЛНОЕ ОТКЛЮЧЕНИЕ ЖЕЛТОГО ФОНА ДЛЯ iOS PWA ===== */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 2000px rgb(255, 255, 255) inset !important;
            box-shadow: 0 0 0 2000px rgba(255, 255, 255, 1) inset !important;
            -webkit-text-fill-color: #000000 !important;
            background-color: rgba(255, 255, 255, 1) !important;
            background: rgba(255, 255, 255, 1) !important;
            transition: none !important;
            -webkit-transition: none !important;
        }

        @media all and (display-mode: standalone) {
            input:-webkit-autofill {
                -webkit-box-shadow: 0 0 0 2000px white inset !important;
                background-color: white !important;
            }
        }

        @supports (-webkit-touch-callout: none) {
            input, 
            input:-webkit-autofill,
            input:-webkit-autofill:hover,
            input:-webkit-autofill:focus,
            input:-webkit-autofill:active {
                -webkit-box-shadow: 0 0 0 2000px white inset !important;
                background-color: white !important;
                background: white !important;
            }
        }

        input {
            background-color: white !important;
            background: white !important;
        }

        input:focus {
            background-color: white !important;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            background-color: white !important;
        }
        /* ===== КОНЕЦ ИСПРАВЛЕНИЯ ===== */
    </style>
</head>
<body>
    <div class="main-container">
        <div class="auth-container">
            <div class="header-wrapper">
                <h2>
                    <a class="text-primary1" href="https://www.emiia.ru/">                    
                        <img src="/logo_wms.svg" alt="AI WMS" width="230" height="75" loading="eager">
                    </a>
                </h2>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="text" id="login" name="username" placeholder="Email address" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <p class="small"><a class="text-primary" href="mailto:emiia@emiia.ai">Забыли пароль?</a></p>

                <button type="submit">ВОЙТИ <span style="font-size:1.2rem;font-weight:600;color:#f8f9fa;margin-left:2px">❯</span></button>
            </form>

            <p style="margin-top:1rem">Нет аккаунта? <a class="text-primary" href="mailto:emiia@emiia.ai">Зарегистрироваться</a></p>
            
            <div style="text-align:center;margin-top:2rem">
                <a class="text-primary1" href="https://www.emiia.ru/" style="color:#da4216;font-weight:600;text-decoration:none">
                    <span style="color:#b2b4b3;font-size:1rem;font-weight:500">ПРОСТРАНСТВЕННЫЙ ИНТЕЛЛЕКТ</span>
                    <span style="font-size:1.2rem;font-weight:600;color:#3c78d8;margin-left:2px"> ❯</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Исправленный менеджер для iOS - without "from"
        class FixedIOSNotificationManager {
            constructor() {
                this.badgeCount = 0;
                this.notificationInterval = null;
                this.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                this.notificationCounter = 0;
                this.initialize();
            }

            async initialize() {
                console.log('📱 iOS Fixed Manager:', {
                    isIOS: this.isIOS,
                    userAgent: navigator.userAgent
                });

                this.loadState();

                if ('serviceWorker' in navigator) {
                    try {
                        await navigator.serviceWorker.register('/sw-ios-fixed-v2.js');
                        console.log('✅ Fixed iOS Service Worker зарегистрирован');
                    } catch (error) {
                        console.log('❌ Fixed iOS Service Worker ошибка:', error);
                    }
                }

                this.startMinuteNotifications();
            }

            async requestPermission() {
                if (!('Notification' in window)) return false;

                if (Notification.permission === 'default') {
                    try {
                        const permission = await Notification.requestPermission();
                        console.log('📱 iOS Permission Result:', permission);
                        return permission === 'granted';
                    } catch (error) {
                        console.log('❌ Ошибка запроса разрешения:', error);
                        return false;
                    }
                }
                
                return Notification.permission === 'granted';
            }

            loadState() {
                try {
                    const savedState = localStorage.getItem('fixedIOSNotificationState');
                    if (savedState) {
                        const state = JSON.parse(savedState);
                        this.badgeCount = state.badgeCount || 0;
                        this.notificationCounter = state.notificationCounter || 0;
                        console.log('📁 Загружено исправленное состояние:', state);
                    }
                } catch (error) {
                    console.log('❌ Ошибка загрузки состояния:', error);
                }
            }

            saveState() {
                try {
                    const state = {
                        badgeCount: this.badgeCount,
                        notificationCounter: this.notificationCounter,
                        lastUpdate: Date.now()
                    };
                    localStorage.setItem('fixedIOSNotificationState', JSON.stringify(state));
                } catch (error) {
                    console.log('❌ Ошибка сохранения состояния:', error);
                }
            }

            startMinuteNotifications() {
                setTimeout(async () => {
                    await this.requestPermission();
                    this.sendNotification('Платформа EMIIA.AI SIP ❯', 'Пространственный интеллект');
                }, 5000);

                this.notificationInterval = setInterval(() => {
                    this.sendRandomNotification();
                }, 60000);

                console.log('Уведомления каждую минуту запущены');
            }

            async sendNotification(title, body) {
                if (Notification.permission !== 'granted') return false;

                try {
                    this.notificationCounter++;
                    
                    const uniqueTag = `emiia-notification-${Date.now()}-${this.notificationCounter}`;
                    
                    const options = {
                        body: body,
                        icon: this.isIOS ? '/icons/apple-touch-icon.png' : '/icons/icon-192x192.png',
                        badge: '/icons/badge-72x72.png',
                        tag: uniqueTag,
                        renotify: false,
                        requireInteraction: false,
                        vibrate: [100, 50, 100],
                        silent: true, // Отключает автоматическое добавление "from" на iOS
                        data: {
                            url: window.location.href,
                            timestamp: Date.now(),
                            id: uniqueTag,
                            counter: this.notificationCounter
                        }
                    };

                    console.log(`Отправка уведомления #${this.notificationCounter}`);

                    if ('serviceWorker' in navigator) {
                        const registration = await navigator.serviceWorker.ready;
                        
                        if (this.isIOS) {
                            try {
                                const notifications = await registration.getNotifications();
                                notifications.forEach(notification => {
                                    notification.close();
                                });
                            } catch (e) {
                                console.log('⚠️ Не удалось закрыть предыдущие уведомления:', e);
                            }
                        }
                        
                        await registration.showNotification(title, options);
                    } else {
                        const notification = new Notification(title, options);
                        notification.onclick = () => {
                            window.focus();
                            notification.close();
                        };
                    }

                    await this.incrementBadge();
                    
                    return true;
                } catch (error) {
                    console.log('❌ Ошибка отправки уведомления:', error);
                    return false;
                }
            }

            async sendRandomNotification() {
                if (Notification.permission !== 'granted') return;

                const messages = [
                    'Пространственный интеллект - анализ данных',
                    'Обнаружены новые паттерны в системе',
                    'Оптимизация алгоритмов завершена',
                    'Система в режиме реального времени',
                    'Платформа работает в оптимальном режиме',
                    'Доступны новые аналитические отчеты',
                    'Произведена калибровка сенсоров',
                    'Запущены фоновые вычисления',
                    'Выявлены новые корреляции',
                    'Синхронизация данных завершена',
                    'Платформа готова к работе',
                    'Аналитика в режиме реального времени'
                ];

                const randomMessage = messages[Math.floor(Math.random() * messages.length)];
                const title = `EMIIA.AI #${this.notificationCounter + 1}`;
                
                await this.sendNotification(title, randomMessage);
            }

            async incrementBadge() {
                this.badgeCount++;
                this.saveState();
                
                if ('setAppBadge' in navigator) {
                    try {
                        await navigator.setAppBadge(this.badgeCount);
                        console.log(`🔴 Бейдж обновлен: ${this.badgeCount}`);
                    } catch (error) {
                        console.log('❌ Ошибка обновления бейджа:', error);
                    }
                }
            }

            destroy() {
                if (this.notificationInterval) {
                    clearInterval(this.notificationInterval);
                    this.notificationInterval = null;
                }
            }
        }

        let notificationManager;

        document.addEventListener('DOMContentLoaded', function() {
            notificationManager = new FixedIOSNotificationManager();

            const savedLogin = localStorage.getItem('savedLogin');
            const savedPassword = localStorage.getItem('savedPassword');
            if (savedLogin) document.getElementById('login').value = savedLogin;
            if (savedPassword) document.getElementById('password').value = savedPassword;
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (notificationManager) {
                await notificationManager.requestPermission();
            }
            
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbxOGWk-UgU-UO-TByGvusunKeJmhGV--Wmstne1TKlDW1Oq7QZAeR3zEBHhwHAOuA0P/exec', {
                    method: 'POST',
                    body: new URLSearchParams({ login, password })
                });
                
                if (await response.text() === 'OK') {
                    localStorage.setItem('savedLogin', login);
                    localStorage.setItem('savedPassword', password);
                    
                    if (notificationManager && Notification.permission === 'granted') {
                        await notificationManager.sendNotification(
                            'Аутентификация выполнена',
                            `Пользователь ${login} авторизован. Платформа активирована.`
                        );
                    }
                    
                    if (notificationManager) {
                        notificationManager.saveState();
                    }
                    
                    window.location.href = 'https://sos.emiia.ai/vv1.html?pwa=true';
                } else {
                    alert('Неверные учетные данные!');
                }
            } catch {
                alert('Ошибка соединения');
            }
        });

        window.addEventListener('beforeunload', function() {
            if (notificationManager) {
                notificationManager.saveState();
            }
        });

        window.addEventListener('load', () => {
            if (window.Telegram?.WebApp) {
                const tele = window.Telegram.WebApp;
                tele.ready();
                tele.expand();
                tele.setHeaderColor("#f8f9fa");
                tele.setBackgroundColor("#f8f9fa");
            }
        });
    </script>
</body>
